<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Numia Bank - Avatar</title>
  <link rel="icon" type="image/png" href="images/N.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --numia-azul: #863DFF;
      --numia-azul-oscuro: #060A27;
      --numia-success: #10b981;
      --numia-text: #1f2937;
      --numia-text-light: #6b7280;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: #000;
      color: var(--numia-text);
      min-height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    
    /* Contenedor del avatar */
    .avatar-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    
    .avatar-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      flex: 1;
      min-height: 0;
    }
    
    /* Botón para volver al menú */
    .btn-volver-menu {
      position: fixed !important;
      top: 20px !important;
      right: 20px !important;
      z-index: 10000 !important;
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%) !important;
      color: white !important;
      border: 3px solid white !important;
      border-radius: 50px !important;
      padding: 0.75rem 1.5rem !important;
      font-size: 1rem !important;
      font-weight: 700 !important;
      cursor: pointer !important;
      box-shadow: 0 6px 20px rgba(255, 107, 107, 0.5), 0 0 0 3px rgba(255, 107, 107, 0.2) !important;
      display: flex !important;
      align-items: center !important;
      gap: 0.5rem !important;
      transition: all 0.3s !important;
      animation: pulse 2s infinite !important;
      visibility: visible !important;
      opacity: 1 !important;
      text-decoration: none !important;
    }
    
    .btn-volver-menu:hover {
      background: linear-gradient(135deg, #ff5252 0%, #d32f2f 100%) !important;
      transform: translateY(-2px) scale(1.05) !important;
      box-shadow: 0 8px 24px rgba(255, 107, 107, 0.6), 0 0 0 4px rgba(255, 107, 107, 0.3) !important;
      text-decoration: none !important;
      color: white !important;
    }
    
    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 6px 20px rgba(255, 107, 107, 0.5), 0 0 0 3px rgba(255, 107, 107, 0.2);
      }
      50% {
        box-shadow: 0 6px 20px rgba(255, 107, 107, 0.7), 0 0 0 6px rgba(255, 107, 107, 0.4);
      }
    }
  </style>
</head>
<body>
  <!-- Contenedor del avatar -->
  <div class="avatar-container">
    <iframe 
      src="https://filavirtual.preprod.debmedia.com/Numiabot/#/TDNFYImANgm606yYSWyH" 
      title="Avatar" 
      allow="microphone; camera; autoplay" 
      allowfullscreen>
    </iframe>
  </div>
  
  <!-- Botón para volver al menú -->
  <a href="totem.html" class="btn-volver-menu" id="btnVolverMenu" title="Volver al menú">
    <i class="bi bi-arrow-left"></i>
    <span>Volver al Menú</span>
  </a>
</body>
</html>
